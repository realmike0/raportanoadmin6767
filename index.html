<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raportano Live Score - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { color-scheme: light dark; }

        @media (prefers-color-scheme: light) {
            body { background: #fffbfe; color: #1c1b1f; }
            :root {
                --primary: #7d5260;
                --on-primary: #ffffff;
                --surface: #fffbfe;
                --surface-container: #f7f2f6;
                --outline: #79747e;
                --error: #b3261e;
                --success: #1b5e20;
            }
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1c1b1f; color: #e6e1e5; }
            :root {
                --primary: #eaddff;
                --on-primary: #432874;
                --surface: #1c1b1f;
                --surface-container: #2f2d32;
                --outline: #9e9da0;
                --error: #f2b8b5;
                --success: #69f0ae;
            }
        }

        body { font-family: 'Roboto', sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        header { padding: 1rem; text-align: center; border-bottom: 1px solid var(--outline); background: var(--surface-container); }
        header h1 { font-size: 1.5rem; font-weight: 700; }

        .navbar { display: flex; gap: 0.5rem; padding: 1rem; border-bottom: 1px solid var(--outline); overflow-x: auto; background: var(--surface-container); }
        .nav-btn { padding: 0.75rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap; background: transparent; }
        .nav-btn.active { background: var(--primary); color: var(--on-primary); }

        .content { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .screen { display: none; }
        .screen.active { display: block; }

        .card { background: var(--surface-container); border: 1px solid var(--outline); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        .card h2 { font-size: 1.25rem; margin-bottom: 1rem; color: var(--primary); }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--outline); border-radius: 8px; background: var(--surface); color: inherit; font-family: inherit; font-size: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }

        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: var(--on-primary); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: var(--surface-container); color: inherit; border: 1px solid var(--outline); }
        .btn-error { background: var(--error); color: #ffffff; }
        .btn-success { background: var(--success); color: var(--surface); }

        .notification { background: var(--surface-container); border-left: 4px solid var(--primary); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .notification.error { border-left-color: var(--error); }
        .notification.success { border-left-color: var(--success); }

        .news-item { background: var(--surface); border: 1px solid var(--outline); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: start; }
        .news-text { flex: 1; }
        .news-text h3 { margin-bottom: 0.5rem; }
        .news-text p { opacity: 0.7; font-size: 0.9rem; }

        .calendar-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .match-card { background: var(--surface); border: 1px solid var(--outline); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.3s; }
        .match-card:hover { background: var(--surface-container); }
        .match-score { font-size: 1.5rem; font-weight: 700; text-align: center; margin: 0.5rem 0; }
        .match-stats { background: var(--surface-container); padding: 1rem; border-radius: 6px; margin-top: 1rem; }
        .stat-item { padding: 0.5rem 0; display: flex; justify-content: space-between; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        thead { border-bottom: 2px solid var(--outline); }
        th, td { padding: 0.75rem; text-align: left; font-size: 0.95rem; }
        tbody tr { border-bottom: 1px solid var(--outline); }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }

        @media (max-width: 768px) {
            .calendar-container { grid-template-columns: 1fr; }
            .navbar { gap: 0.25rem; }
            .nav-btn { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>⚽ Raportano Live Score - Admin</h1>
        </header>

        <nav class="navbar">
            <button class="nav-btn active" onclick="switchScreen('home', this)">🏠 Home</button>
            <button class="nav-btn" onclick="switchScreen('partite', this)">⚽ Partite</button>
            <button class="nav-btn" onclick="switchScreen('calendario', this)">📅 Calendario</button>
            <button class="nav-btn" onclick="switchScreen('staff', this)">👥 Staff</button>
            <button class="nav-btn" onclick="switchScreen('regolamento', this)">📄 Regolamento</button>
        </nav>

        <div class="content">
            <!-- HOME -->
            <div id="home" class="screen active">
                <div id="homeNotification"></div>

                <div class="card">
                    <h2>📰 Scrivi Notizia</h2>
                    <div class="form-group">
                        <label>Titolo</label>
                        <input type="text" id="newsTitle" placeholder="Titolo notizia">
                    </div>
                    <div class="form-group">
                        <label>Testo</label>
                        <textarea id="newsText" placeholder="Contenuto notizia" rows="3"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="publishNews()" style="width: 100%;">📝 Pubblica Notizia</button>
                </div>

                <div class="card">
                    <h2>📋 Notizie</h2>
                    <div id="newsList">
                        <p style="opacity: 0.7; text-align: center;">Caricamento notizie...</p>
                    </div>
                </div>
            </div>

            <!-- PARTITE -->
            <div id="partite" class="screen">
                <div id="partiteNotification"></div>

                <div class="card">
                    <h2>⚽ Nuova Partita</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Squadra 1</label>
                            <select id="team1">
                                <option value="">Seleziona</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Squadra 2</label>
                            <select id="team2">
                                <option value="">Seleziona</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" id="matchDate">
                        </div>
                    </div>
                    <button class="btn btn-success" onclick="startNewMatch()" style="width: 100%;">▶️ Avvia Partita</button>
                </div>

                <div class="card">
                    <h2>⚽ Registra Gol</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Marcatore</label>
                            <input type="text" id="goalScorer" placeholder="Nome">
                        </div>
                        <div class="form-group">
                            <label>Minuto</label>
                            <input type="number" id="goalMinute" placeholder="45" min="0" max="120">
                        </div>
                        <div class="form-group">
                            <label>Squadra</label>
                            <select id="goalTeam">
                                <option value="">Scegli</option>
                                <option value="1">Squadra 1</option>
                                <option value="2">Squadra 2</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addGoal()">➕ Registra Gol</button>
                    <button class="btn btn-secondary" onclick="undoLastGoal()" style="margin-left: 0.5rem;">↩️ Annulla</button>
                </div>

                <div class="card">
                    <h2>📊 Risultato</h2>
                    <div style="font-size: 2rem; font-weight: 700; text-align: center; margin: 1rem 0;" id="finalScore">0 - 0</div>
                    <div style="background: var(--surface); border: 1px solid var(--outline); border-radius: 8px; padding: 1rem; max-height: 250px; overflow-y: auto;" id="goalsList">
                        <p style="opacity: 0.7; text-align: center;">Nessun gol</p>
                    </div>
                    <button class="btn btn-success" style="width: 100%; margin-top: 1rem;" onclick="saveMatch()">💾 Salva Partita</button>
                </div>
            </div>

            <!-- CALENDARIO -->
            <div id="calendario" class="screen">
                <div id="calendarioNotification"></div>

                <div class="calendar-container">
                    <div>
                        <h2 style="margin-bottom: 1rem;">📅 Partite</h2>
                        <div id="matchesList">
                            <p style="opacity: 0.7; text-align: center;">Caricamento partite...</p>
                        </div>
                    </div>
                    <div>
                        <h2 style="margin-bottom: 1rem;">📊 Dettagli</h2>
                        <div id="matchDetails">
                            <p style="opacity: 0.7; text-align: center;">Seleziona una partita</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- STAFF -->
            <div id="staff" class="screen">
                <div id="staffNotification"></div>

                <div class="card">
                    <h2>👥 Gestisci Staff</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Ruolo</th>
                                <th>Nome</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="staffTable">
                            <tr>
                                <td colspan="3" class="text-center">Caricamento...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- REGOLAMENTO -->
            <div id="regolamento" class="screen">
                <div id="regolamentoNotification"></div>

                <div class="card">
                    <h2>📄 Regolamento</h2>
                    <div class="form-group">
                        <label>Carica PDF</label>
                        <input type="file" id="pdfFile" accept=".pdf">
                    </div>
                    <button class="btn btn-primary" onclick="uploadPDF()">📤 Carica</button>
                    <button class="btn btn-secondary" onclick="downloadPDF()" style="margin-left: 0.5rem;">📥 Scarica</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nvkpmmktfzhepswkwctb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VlZNFZJSHCTqqa7h0939bQ_X5CLfyLF";

        let currentMatch = { team1: "", team2: "", score1: 0, score2: 0, goals: [], date: "" };
        let teams = [];
        let matches = [];
        let news = [];
        let selectedMatchId = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('matchDate').valueAsDate = new Date();
            loadTeams();
            loadMatches();
            loadNews();
            loadStaff();
        });

        function switchScreen(screenName, button) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(screenName).classList.add('active');
            if (button) button.classList.add('active');
        }

        async function apiCall(method, table, data = null) {
            const url = `${SUPABASE_URL}/rest/v1/${table}`;
            const options = {
                method,
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                }
            };
            if (data) options.body = JSON.stringify(Array.isArray(data) ? data : [data]);
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(await response.text());
                return await response.json();
            } catch (err) {
                return null;
            }
        }

        async function loadTeams() {
            const result = await apiCall('GET', 'teams');
            if (result && Array.isArray(result)) {
                teams = result;
                ['team1', 'team2'].forEach(id => {
                    const select = document.getElementById(id);
                    select.innerHTML = '<option value="">Seleziona squadra</option>';
                    teams.forEach(team => {
                        const opt = document.createElement('option');
                        opt.value = team.id;
                        opt.textContent = team.name;
                        select.appendChild(opt);
                    });
                });
                showNotification('partiteNotification', '✅ Squadre caricate!', 'success');
            }
        }

        async function loadMatches() {
            const result = await apiCall('GET', 'matches');
            if (result && Array.isArray(result)) {
                matches = result.sort((a, b) => new Date(b.date) - new Date(a.date));
                updateMatchesList();
            }
        }

        function updateMatchesList() {
            const div = document.getElementById('matchesList');
            if (!matches.length) {
                div.innerHTML = '<p style="opacity: 0.7; text-align: center;">Nessuna partita</p>';
                return;
            }
            div.innerHTML = matches.map(m => {
                const t1 = teams.find(t => t.id === m.team1_id)?.name || 'Squad1';
                const t2 = teams.find(t => t.id === m.team2_id)?.name || 'Squad2';
                return `
                    <div class="match-card" onclick="selectMatch('${m.id}')">
                        <div style="font-size: 0.85rem; opacity: 0.7;">${m.date}</div>
                        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem; align-items: center;">
                            <div style="text-align: right; font-weight: 600;">${t1}</div>
                            <div style="font-size: 1.5rem; font-weight: 700;">${m.score1 || 0} - ${m.score2 || 0}</div>
                            <div style="font-weight: 600;">${t2}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectMatch(matchId) {
            selectedMatchId = matchId;
            const match = matches.find(m => m.id === matchId);
            if (!match) return;

            const t1 = teams.find(t => t.id === match.team1_id)?.name || 'Squad1';
            const t2 = teams.find(t => t.id === match.team2_id)?.name || 'Squad2';

            const div = document.getElementById('matchDetails');
            div.innerHTML = `
                <div style="background: var(--surface-container); padding: 1rem; border-radius: 8px;">
                    <h3 style="margin-bottom: 1rem;">${t1} vs ${t2}</h3>
                    <div style="text-align: center; font-size: 2rem; font-weight: 700; margin: 1rem 0;">${match.score1 || 0} - ${match.score2 || 0}</div>
                    <div style="opacity: 0.7; margin-bottom: 1rem;">${match.date}</div>
                    <div style="background: var(--surface); padding: 1rem; border-radius: 6px;">
                        <p><strong>Status:</strong> ${match.status || 'N/A'}</p>
                        <p><strong>Gol Squadra 1:</strong> ${match.score1 || 0}</p>
                        <p><strong>Gol Squadra 2:</strong> ${match.score2 || 0}</p>
                    </div>
                </div>
            `;
        }

        function startNewMatch() {
            const t1 = document.getElementById('team1').value;
            const t2 = document.getElementById('team2').value;
            if (!t1 || !t2) {
                showNotification('partiteNotification', '❌ Seleziona squadre', 'error');
                return;
            }
            const t1Name = teams.find(t => t.id === t1)?.name || 'Squadra 1';
            const t2Name = teams.find(t => t.id === t2)?.name || 'Squadra 2';
            currentMatch = { team1: t1, team2: t2, score1: 0, score2: 0, goals: [], date: document.getElementById('matchDate').value };
            document.getElementById('finalScore').textContent = '0 - 0';
            document.getElementById('goalsList').innerHTML = '<p style="opacity: 0.7; text-align: center;">Nessun gol</p>';
            showNotification('partiteNotification', `▶️ Partita avviata: ${t1Name} vs ${t2Name}`, 'success');
        }

        function addGoal() {
            const scorer = document.getElementById('goalScorer').value.trim();
            const minute = document.getElementById('goalMinute').value;
            const team = document.getElementById('goalTeam').value;
            if (!scorer || !minute || !team) {
                showNotification('partiteNotification', '❌ Compila campi', 'error');
                return;
            }
            currentMatch.goals.push({ scorer, minute: parseInt(minute), team: parseInt(team) });
            if (team === '1') currentMatch.score1++;
            else currentMatch.score2++;
            document.getElementById('finalScore').textContent = `${currentMatch.score1} - ${currentMatch.score2}`;
            updateGoalsDisplay();
            document.getElementById('goalScorer').value = '';
            document.getElementById('goalMinute').value = '';
            document.getElementById('goalTeam').value = '';
            showNotification('partiteNotification', `⚽ Gol di ${scorer}!`, 'success');
        }

        function undoLastGoal() {
            if (!currentMatch.goals.length) return;
            const goal = currentMatch.goals.pop();
            if (goal.team === 1) currentMatch.score1--;
            else currentMatch.score2--;
